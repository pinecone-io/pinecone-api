openapi: 3.0.3
info:
  title: Pinecone assistant data plane API
  description: Pinecone Assistant Engine is a context engine to store and retrieve relevant knowledge from millions of documents at scale. This API supports interactions with assistants.
  contact:
    name: Pinecone Support
    url: https://support.pinecone.io
    email: support@pinecone.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 2026-04
servers:
- url: https://{assistant_host}
  variables:
    assistant_host:
      default: unknown
      description: The host of the created assistant
paths:
  /files/{assistant_name}:
    get:
      tags:
      - Manage Assistants
      summary: List Files
      description: |-
        List all files in an assistant, with an option to filter files with metadata.

        For guidance and examples, see [Manage files](https://docs.pinecone.io/guides/assistant/manage-files#list-files-in-an-assistant).
      operationId: list_files
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant to list files for.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      - in: query
        name: filter
        description: Optional JSON-encoded metadata filter for files.
        schema:
          type: string
          format: json
        example: '{"genre":{"$eq":"comedy"}}'
        style: form
      - in: query
        name: limit
        description: Limit on the number of files to return.
        schema:
          type: integer
        example: 100
        style: form
      - in: query
        name: pagination_token
        description: Pagination token to continue a previous listing operation.
        schema:
          type: string
        example: dXNlcl9pZD11c2VyXzE=
        style: form
      responses:
        '200':
          description: This operation returns a list of all files that you have previously uploaded, and which are associated with the given assistant name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: Assistant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                assistant-not-found:
                  summary: Assistant not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: Assistant "example-assistant" not found.
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
    post:
      tags:
      - Manage Assistants
      summary: Upload a file
      description: |-
        Upload a file to the specified assistant.

        An identifier will be generated. To specify a file identifier or to replace file content, use the upsert endpoint (`PUT /files/{assistant_name}/{assistant_file_id}`).

        This operation is asynchronous. The response includes an operation ID that can be used to poll for completion via the describe operation endpoint.

        For guidance and examples, see [Manage files](https://docs.pinecone.io/guides/assistant/manage-files#upload-a-local-file).
      operationId: upload_file
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant to upload files to.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      - in: query
        name: multimodal
        description: Optional flag to opt in to multimodal file processing (PDFs only). Can be either `true` or `false`. Default is `false`.
        schema:
          x-enum:
          - 'true'
          - 'false'
          type: string
        style: form
      requestBody:
        description: The desired file to be uploaded and processed into the assistant.
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FileData'
        required: true
      responses:
        '202':
          description: File upload accepted. Processing has started.
          headers:
            Location:
              description: URL to the operation resource for polling status.
              style: simple
              schema:
                example: /operations/test-assistant/op-1234-abcd
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationModel'
        '400':
          description: Bad request. The request body included invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                files-validation-error:
                  summary: Validation error on ingest.
                  value:
                    error:
                      code: INVALID_ARGUMENT
                      message: Uploaded file can only currently be either a pdf or txt file
                    status: 400
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: Assistant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                assistant-not-found:
                  summary: Assistant not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: Assistant "example-assistant" not found.
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
  /files/{assistant_name}/{assistant_file_id}:
    get:
      tags:
      - Manage Assistants
      summary: Describe a file
      description: '[Get the current status and metadata of a file](https://docs.pinecone.io/guides/assistant/manage-files#get-the-status-of-a-file) uploaded to an assistant.'
      operationId: describe_file
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant that contains the file.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      - in: path
        name: assistant_file_id
        description: The identifier of the file to be described.
        required: true
        schema:
          type: string
        example: my-file-id-123
        style: simple
      - in: query
        name: include_url
        description: Include the signed URL of the file in the response.
        schema:
          x-enum:
          - 'true'
          - 'false'
          type: string
        style: form
      responses:
        '200':
          description: Poll request successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantFileModel'
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                file-not-found:
                  summary: File not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: File with id 72490b32-46d9-4db1-b48b-666e9176d9be  not found in provided assistant
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
    put:
      tags:
      - Manage Assistants
      summary: Upsert a file
      description: |-
        Create or replace a file in the specified assistant. If a file with the given `assistant_file_id` already exists, it will be replaced with the new file. If it doesn't exist, a new file will be created with that identifier.

        This operation is asynchronous. The file processing will occur in the background.

        For guidance and examples, see [Manage files](https://docs.pinecone.io/guides/assistant/manage-files#upload-a-local-file).
      operationId: upsert_file
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant to upload files to.
        required: true
        schema:
          type: string
        example: test-model
        style: simple
      - in: path
        name: assistant_file_id
        description: The identifier of the file to be created or replaced. Must be 1-128 characters long and consist only of alphanumeric characters, hyphens (-), or underscores (_).
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
        example: my-file-id-123
        style: simple
      - in: query
        name: multimodal
        description: Optional flag to opt in to multimodal file processing (PDFs only). Can be either `true` or `false`. Default is `false`.
        schema:
          x-enum:
          - 'true'
          - 'false'
          type: string
        style: form
      requestBody:
        description: The desired file to be uploaded and processed into the assistant.
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FileData'
        required: true
      responses:
        '202':
          description: File upload has been accepted for processing. The file will be created if it doesn't exist, or replaced if it already exists. The operation will complete asynchronously.
          headers:
            Location:
              description: URL to the operation resource for polling status.
              style: simple
              schema:
                example: /operations/test-assistant/op-1234-abcd
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationModel'
        '400':
          description: Bad request. The request body included invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                files-validation-error:
                  summary: Validation error on ingest.
                  value:
                    error:
                      code: INVALID_ARGUMENT
                      message: Uploaded file can only currently be either a pdf or txt file
                    status: 400
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: Assistant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                assistant-not-found:
                  summary: Assistant not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: Assistant "example-assistant" not found.
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
    delete:
      tags:
      - Manage Assistants
      summary: Delete a file
      description: |-
        [Delete an uploaded file](https://docs.pinecone.io/guides/assistant/manage-files#delete-a-file) from an assistant.

        This operation is asynchronous. The response includes an operation ID that can be used to poll for completion via the describe operation endpoint.
      operationId: delete_file
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant that contains the file.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      - in: path
        name: assistant_file_id
        description: The identifier of the file to be deleted.
        required: true
        schema:
          type: string
        example: my-file-id-123
        style: simple
      responses:
        '202':
          description: The request to delete the file has been accepted. The deletion will be processed asynchronously.
          headers:
            Location:
              description: URL to the operation resource for polling status.
              style: simple
              schema:
                example: /operations/test-assistant/op-1234-abcd
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationModel'
        '204':
          description: The file was deleted immediately. This occurs when deleting a file that previously failed processing.
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                file-not-found:
                  summary: File not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: File with id 72490b32-46d9-4db1-b48b-666e9176d9be  not found in provided assistant
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
  /operations/{assistant_name}:
    get:
      tags:
      - Manage Assistants
      summary: List operations
      description: |
        List all operations for an assistant. Returns operations that are in progress, as well as recently completed or failed operations.
        Both successful and failed operations are retained for 30 days after completion.
        Use the `operation_type` and `status` query parameters to filter results.
      operationId: list_operations
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant to list operations for.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      - in: query
        name: operation_type
        description: Filter operations by type.
        schema:
          x-enum:
          - upload_file
          - upsert_file
          - update_file_metadata
          - delete_file
          type: string
        example: upload_file
        style: form
      - in: query
        name: status
        description: Filter operations by status.
        schema:
          x-enum:
          - Processing
          - Completed
          - Failed
          type: string
        example: Processing
        style: form
      - in: query
        name: limit
        description: Limit on the number of operations to return.
        schema:
          type: integer
          minimum: 1
          maximum: 100
        example: 100
        style: form
      - in: query
        name: pagination_token
        description: Pagination token to continue a previous listing operation.
        schema:
          type: string
        example: dXNlcl9pZD11c2VyXzE=
        style: form
      responses:
        '200':
          description: A list of operations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationList'
              examples:
                multiple-operations:
                  summary: Multiple operations with different states
                  value:
                    operations:
                    - created_on: 2025-10-01T12:30:00Z
                      file_id: my-report-2025
                      id: op-1234-abcd-5678
                      operation_type: upload_file
                      percent_complete: 42
                      status: Processing
                    - completed_on: 2025-10-01T12:05:00Z
                      created_on: 2025-10-01T12:00:00Z
                      file_id: quarterly-analysis
                      id: op-8765-dcba-4321
                      operation_type: upload_file
                      percent_complete: 100
                      status: Completed
                    - completed_on: 2025-10-01T11:32:00Z
                      created_on: 2025-10-01T11:30:00Z
                      error_message: 'File processing failed: unsupported file format.'
                      file_id: invalid-file
                      id: op-5555-eeee-9999
                      operation_type: upload_file
                      percent_complete: 15
                      status: Failed
                    - completed_on: 2025-10-01T11:02:00Z
                      created_on: 2025-10-01T11:00:00Z
                      file_id: old-report
                      id: op-7777-ffff-0000
                      operation_type: delete_file
                      percent_complete: 100
                      status: Completed
                    pagination:
                      next: dXNlcl9pZD11c2VyXzE=
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: Assistant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                assistant-not-found:
                  summary: Assistant not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: Assistant "example-assistant" not found.
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
  /operations/{assistant_name}/{operation_id}:
    get:
      tags:
      - Manage Assistants
      summary: Describe an operation
      description: |
        Get the status of an operation.
      operationId: describe_operation
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      - in: path
        name: operation_id
        description: The identifier of the operation to be described.
        required: true
        schema:
          type: string
        example: op-1234-abcd-5678
        style: simple
      responses:
        '200':
          description: Current information and status of the operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationModel'
              examples:
                processing-operation:
                  summary: An upload operation in progress
                  value:
                    created_on: 2025-10-01T12:30:00Z
                    file_id: my-report-2025
                    id: op-1234-abcd-5678
                    operation_type: upload_file
                    percent_complete: 42
                    status: Processing
                completed-operation:
                  summary: A completed upload operation
                  value:
                    completed_on: 2025-10-01T12:35:00Z
                    created_on: 2025-10-01T12:30:00Z
                    file_id: my-report-2025
                    id: op-1234-abcd-5678
                    operation_type: upload_file
                    percent_complete: 100
                    status: Completed
                failed-operation:
                  summary: A failed operation
                  value:
                    completed_on: 2025-10-01T11:32:00Z
                    created_on: 2025-10-01T11:30:00Z
                    error_message: 'File processing failed: unsupported file format.'
                    file_id: invalid-file
                    id: op-5555-eeee-9999
                    operation_type: upload_file
                    percent_complete: 15
                    status: Failed
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: Operation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                operation-not-found:
                  summary: Operation not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: Operation 1234-abcd-5678 not found.
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
  /chat/{assistant_name}/chat/completions:
    post:
      tags:
      - Manage Assistants
      summary: Chat through an OpenAI-compatible interface
      description: "Chat with an assistant. This endpoint is based on the OpenAI Chat Completion API, a commonly used and adopted API. \n\nIt is useful if you need inline citations or OpenAI-compatible responses, but has limited functionality compared to the standard chat interface.\n\nFor guidance and examples, see [Chat with an assistant](https://docs.pinecone.io/guides/assistant/chat-with-assistant)."
      operationId: chat_completion_assistant
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant to be described.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      requestBody:
        description: The desired configuration to chat with an assistant through an OpenAI-compatible interface.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchCompletions'
        required: true
      responses:
        '200':
          description: Search request successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionModel'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamChatCompletionChunkModel'
        '400':
          description: Bad request. The request body included invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                files-validation-error:
                  summary: Validation error on ingest.
                  value:
                    error:
                      code: INVALID_ARGUMENT
                      message: Uploaded file can only currently be either a pdf or txt file
                    status: 400
        '401':
          description: 'Unauthorized. Possible causes: Invalid API key.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Invalid API key.
                    status: 401
        '404':
          description: Assistant not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                assistant-not-found:
                  summary: Assistant not found.
                  value:
                    error:
                      code: NOT_FOUND
                      message: Assistant "example-assistant" not found.
                    status: 404
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal-server-error:
                  summary: Internal server error
                  value:
                    error:
                      code: UNKNOWN
                      message: Internal server error
                    status: 500
  /chat/{assistant_name}:
    post:
      tags:
      - Manage Assistants
      summary: Chat with an assistant
      description: "Chat with an assistant and get back citations in structured form. \n\nThis is the recommended way to chat with an assistant, as it offers more functionality and control over the assistant's responses and references than the OpenAI-compatible chat interface.\n\nFor guidance and examples, see [Chat with an assistant](https://docs.pinecone.io/guides/assistant/chat-with-assistant)."
      operationId: chat_assistant
      parameters:
      - in: header
        name: X-Pinecone-Api-Version
        description: Required date-based version header
        required: true
        schema:
          default: 2026-04
          type: string
        style: simple
      - in: path
        name: assistant_name
        description: The name of the assistant to be described.
        required: true
        schema:
          type: string
        example: test-assistant
        style: simple
      requestBody:
        description: The desired configuration to chat with an assistant.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '200':
          description: Search request successful.
